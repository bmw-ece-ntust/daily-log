# Daily-log automation configuration
# Safe to commit: do NOT put secrets here. Use `gh auth login` for GitHub access.

github:
  # Your GitHub login (username) — used to attribute commits
  login: ijosh-ch

  # Contribution sources: which organizations, user repos, and specific repos
  # to scan when looking for your commits.
  contribution_sources:
    # GitHub organizations where your commits count
    orgs:
      - bmw-ece-ntust
    # Users/owners whose repos to include (e.g., your supervisor's or collaborator's repos)
    # Format: GitHub username (their repos, your commits)
    repo_owners: []
      # - raycg
    # Specific repos to include (format: owner/repo-name)
    repos: []
      # - bmw-ece-ntust/some-specific-repo

  # The issue where your daily-log "bubbles" live
  repo_owner: bmw-ece-ntust
  repo_name: progress-plan
  issue_number: 366

  # Timezone used to interpret commit timestamps and day boundaries.
  # Format: IANA TZ or fixed offset.
  timezone: Asia/Taipei

  # When creating a missing day comment, whether to seed Daily-logs bullets
  # from that day's commits (end time filled from commit timestamp).
  seed_new_day_from_commits: true

  # If a commit isn't referenced by any existing Daily-logs bullet,
  # append it as a new bullet under **Daily-logs**.
  append_unmatched_commits: true

# Timeline for daily-log checks
timeline:
  # How far back to check for missing dates by default (in days)
  lookback_days: 14
  # Historical start date for full backfill (YYYY-MM-DD)
  # Used when running --since start or doing a full historical sweep
  start_date: "2023-09-01"

# Google Calendar integration
# Requires: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
google_calendar:
  enabled: false
  # Path to OAuth2 credentials JSON (download from Google Cloud Console:
  # APIs & Services > Credentials > OAuth 2.0 Client IDs > Download JSON)
  credentials_file: "~/.config/dailylog/credentials.json"
  # Path to cached OAuth token (auto-generated after first authentication)
  token_file: "~/.config/dailylog/token.json"
  # Calendar ID: "primary" for your main calendar, or the calendar email address
  calendar_id: "primary"
  # Keywords identifying class/lecture events — these don't require evidence links
  class_keywords:
    - "class"
    - "lecture"
    - "seminar"
    - "course"
    - "tutorial"

# Reminder generation settings
reminder:
  # Default output path for the generated reminder.md
  output_path: "reminder.md"

schedule:
  # If you set up cron/systemd, run twice daily.
  times: ["17:00", "23:00"]

planning:
  # Used by the 09:00 weekday job to seed a new day comment with suggested tasks.
  enabled: false
  sources:
    - "github_issue_body"
    - "README.md"
    - "daily-logs/2025-daily-log.md"
  max_suggestions: 6
  include_backlog: true

overleaf:
  enabled: false
  # Overleaf activity is summarized from a local git clone.
  # Example:
  # projects:
  #   - name: "IEEE Digital Twin Magazine"
  #     repo_path: "/home/ubuntu/overleaf/ieee-dt"
  projects: []

llm:
  enabled: false
  # Copilot Chat in VS Code is not exposed as a stable automation API.
  # If you want LLM-based analysis, configure an OpenAI-compatible endpoint (e.g., Ollama, Azure OpenAI).
  provider: "openai_compatible"
  base_url: "http://localhost:11434/v1"
  model: "gpt-oss:20b"
  api_key_env: "LLM_API_KEY"
